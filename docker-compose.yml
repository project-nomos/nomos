services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: nomos-postgres
    environment:
      POSTGRES_USER: nomos
      POSTGRES_PASSWORD: nomos
      POSTGRES_DB: nomos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-EXEC", "pg_isready -U nomos -d nomos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  nomos:
    build: .
    container_name: nomos-agent
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nomos:nomos@postgres:5432/nomos
      # Set your API provider and key:
      # ANTHROPIC_API_KEY: sk-ant-...
      # NOMOS_API_PROVIDER: openrouter
      # OPENROUTER_API_KEY: sk-or-...
    env_file:
      - path: .env
        required: false
    ports:
      - "8766:8766" # gRPC
      - "8765:8765" # WebSocket
    restart: unless-stopped

volumes:
  pgdata:
